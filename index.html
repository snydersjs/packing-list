<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Packing List</title>
<link rel="icon" type="image/png" href="packing-list-icon.png">
<link rel="apple-touch-icon" href="packing-list-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pack">
<meta name="theme-color" content="#0F1923">
<style>
:root {
  --bg:        #0F1923;
  --surface:   #1A2535;
  --surface2:  #222F42;
  --surface3:  #2A3A52;
  --border:    #2E3F58;
  --border2:   #3A5070;
  --text:      #E8EDF3;
  --text2:     #8FA8C4;
  --text3:     #5A7A9A;
  --accent:    #3B82C4;
  --accent-bg: #1A2F48;
  --packed:    #2A9D5C;
  --packed-bg: #0F2A1E;
  --optional:  #7C6FAA;
  --opt-bg:    #1E1A30;
  --danger:    #C0392B;
  --danger-bg: #2A1015;
  --tab-h:     48px;
  --header-h:  56px;
  --r:         8px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
}

/* ── Layout shells ── */
#app { display: flex; flex-direction: column; height: 100vh; }

/* ── Top bar ── */
.topbar {
  height: var(--header-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  flex-shrink: 0;
  z-index: 50;
}
.topbar-title { font-size: 16px; font-weight: 700; letter-spacing: -0.2px; color: var(--text); }
.topbar-meta  { font-size: 12px; color: var(--text3); margin-top: 1px; }
.topbar-left  { flex: 1; min-width: 0; }
.topbar-right { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }

/* ── Tabs ── */
.tabs-bar {
  height: var(--tab-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: stretch;
  overflow-x: auto;
  flex-shrink: 0;
  scrollbar-width: none;
}
.tabs-bar::-webkit-scrollbar { display: none; }
.tab {
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 8px;
  border: none;
  background: none;
  color: var(--text2);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  flex-shrink: 0;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab:hover:not(.active) { color: var(--text); background: var(--surface2); }
.tab-close {
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--surface3);
  border: none;
  color: var(--text3);
  font-size: 11px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  line-height: 1;
}
.tab-close:hover { background: var(--danger-bg); color: var(--danger); }
.tab-add {
  display: flex; align-items: center; padding: 0 14px;
  border: none; background: none;
  color: var(--text3); font-size: 20px; cursor: pointer;
  flex-shrink: 0;
}
.tab-add:hover { color: var(--accent); }

/* ── Progress ── */
.progress-strip {
  background: var(--surface2);
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
}
.progress-track {
  flex: 1;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--packed);
  border-radius: 2px;
  transition: width 0.3s;
}
.progress-label { font-size: 12px; color: var(--text3); white-space: nowrap; }

/* ── Main scroll area ── */
.main-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }

/* ── Setup panel (compact, in-line) ── */
.setup-panel {
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px;
}
.setup-panel-toggle {
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; user-select: none;
}
.setup-panel-toggle span { font-size: 13px; font-weight: 600; color: var(--text2); }
.setup-panel-toggle .chevron { font-size: 11px; color: var(--text3); transition: transform 0.2s; }
.setup-panel.collapsed .chevron { transform: rotate(-90deg); }
.setup-panel.collapsed .setup-form { display: none; }
.setup-form { margin-top: 12px; }
.setup-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
@media (min-width: 768px) {
  .setup-grid { grid-template-columns: repeat(4, 1fr); }
  .setup-grid .span2 { grid-column: span 2; }
}
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-group label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }
.form-group input,
.form-group select {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  color: var(--text);
  font-size: 14px;
  padding: 8px 10px;
  width: 100%;
  appearance: none; -webkit-appearance: none;
}
.form-group input:focus,
.form-group select:focus { outline: none; border-color: var(--accent); }
.form-group input[readonly] { color: var(--text3); }
.form-group input[type="date"] { color-scheme: dark; }
.form-group input[type="date"]::-webkit-calendar-picker-indicator {
  filter: invert(0.7) sepia(0.3) saturate(2) hue-rotate(180deg);
  cursor: pointer;
}
.type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.type-btn {
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: var(--r);
  background: var(--surface);
  color: var(--text2);
  font-size: 13px; font-weight: 500;
  cursor: pointer; text-align: center;
  transition: all 0.15s;
}
.type-btn.sel { border-color: var(--accent); background: var(--accent-bg); color: var(--accent); }
.travel-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
.biz-row { display: none; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
.biz-row.show { display: grid; }
.setup-actions { display: flex; gap: 8px; margin-top: 12px; }

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 9px 16px; border-radius: var(--r); border: none;
  font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s;
  white-space: nowrap;
}
.btn-primary   { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #2d6fa8; }
.btn-ghost     { background: none; border: 1px solid var(--border); color: var(--text2); }
.btn-ghost:hover { background: var(--surface3); color: var(--text); }
.btn-danger    { background: var(--danger-bg); border: 1px solid var(--danger); color: var(--danger); }
.btn-danger:hover { background: #3a1018; }
.btn-sm        { padding: 6px 11px; font-size: 12px; }
.btn-icon-only { padding: 7px 9px; }

/* ── Two-column list layout ── */
.list-body {
  padding: 12px 16px 80px;
  display: grid;
  grid-template-columns: 1fr;
  gap: 0;
  align-items: start;
}
@media (min-width: 768px) {
  .list-body { grid-template-columns: 1fr 1fr; gap: 0 20px; }
}

/* ── Category block ── */
.cat-block { margin-bottom: 16px; }
.cat-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 2px; cursor: pointer; user-select: none;
}
.cat-header h3 {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1px; color: var(--text3);
}
.cat-badge { font-size: 11px; color: var(--text3); }
.cat-chevron { font-size: 10px; color: var(--text3); transition: transform 0.2s; margin-left: 6px; }
.cat-block.collapsed .cat-chevron { transform: rotate(-90deg); }
.cat-block.collapsed .cat-items { display: none; }

.cat-items {
  background: var(--surface);
  border-radius: var(--r);
  border: 1px solid var(--border);
  overflow: hidden;
}

/* ── Item row ── */
.item-row {
  display: flex; align-items: center;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  gap: 10px;
  transition: background 0.1s;
}
.item-row:last-child { border-bottom: none; }
.item-row.is-packed { background: var(--packed-bg); }
.item-name {
  flex: 1; font-size: 14px; line-height: 1.3;
  min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.item-row.is-packed .item-name { text-decoration: line-through; color: var(--text3); }

/* Qty selects - dual dropdown */
.qty-wrap { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
.qty-sel {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text); font-size: 13px;
  padding: 3px 7px; min-width: 44px; text-align: center;
  appearance: none; -webkit-appearance: none; cursor: pointer;
}
.qty-sel:focus { outline: none; border-color: var(--accent); }
.qty-sel.under-packed { border-color: var(--danger); box-shadow: 0 0 0 1px var(--danger); }
.qty-sel.over-packed  { font-weight: 700; }
.qty-divider { font-size: 11px; color: var(--border2); padding: 0 1px; }
.qty-sel.packed-full { background: var(--packed-bg); border-color: var(--packed); color: var(--packed); font-weight: 700; }
.qty-custom-wrap { position: relative; display: inline-flex; }
.qty-custom-input {
  position: absolute; top: calc(100% + 4px); left: 0;
  width: 60px; padding: 5px 8px;
  background: var(--surface3); border: 1px solid var(--accent);
  border-radius: 6px; color: var(--text); font-size: 13px;
  text-align: center; z-index: 20; display: none;
}
.qty-custom-input.open { display: block; }
/* Todo checkbox */
.item-cb {
  width: 18px; height: 18px; border-radius: 4px;
  border: 2px solid var(--border2);
  appearance: none; -webkit-appearance: none;
  background: var(--surface2);
  cursor: pointer; flex-shrink: 0;
  position: relative; transition: all 0.15s;
}
.item-cb:checked { background: var(--packed); border-color: var(--packed); }
.item-cb:checked::after {
  content: ''; position: absolute;
  left: 3px; top: 1px; width: 6px; height: 9px;
  border: 2px solid #fff; border-top: none; border-left: none;
  transform: rotate(45deg);
}

/* ── Optional section ── */
.opt-header {
  padding: 8px 2px 4px;
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1px; color: var(--optional);
  display: flex; align-items: center; gap: 8px;
}
.opt-header::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.opt-items {
  background: var(--surface);
  border-radius: var(--r);
  border: 1px solid var(--border);
  overflow: hidden;
}
.opt-row {
  display: flex; align-items: center;
  padding: 9px 12px;
  border-bottom: 1px solid var(--border);
  gap: 10px;
}
.opt-row:last-child { border-bottom: none; }
.opt-name { flex: 1; font-size: 13px; color: var(--text2); }
.btn-promote {
  font-size: 11px; padding: 4px 9px;
  background: var(--opt-bg); border: 1px solid var(--optional);
  color: var(--optional); border-radius: 5px; cursor: pointer;
  white-space: nowrap; font-weight: 500;
}
.btn-promote:hover { background: var(--optional); color: #fff; }

/* ── Todo section ── */
.todo-section { margin-top: 8px; }
@media (min-width: 768px) {
  .todo-section { grid-column: 1 / -1; }
}
.todo-items {
  background: var(--surface);
  border-radius: var(--r);
  border: 1px solid var(--border);
  overflow: hidden;
}
.todo-row {
  display: flex; align-items: center;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  gap: 10px;
}
.todo-row:last-child { border-bottom: none; }
.todo-text { flex: 1; font-size: 14px; }
.todo-row.done .todo-text { text-decoration: line-through; color: var(--text3); }
.todo-del { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 16px; padding: 2px 4px; border-radius: 4px; }
.todo-del:hover { color: var(--danger); background: var(--danger-bg); }
.todo-add-row { display: flex; gap: 8px; margin-top: 8px; }
.todo-add-row input {
  flex: 1; padding: 8px 12px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); color: var(--text); font-size: 14px;
}
.todo-add-row input:focus { outline: none; border-color: var(--accent); }

/* ── Edit view ── */
.edit-body { padding: 12px 16px 80px; max-width: 760px; margin: 0 auto; }
.edit-cat-block { margin-bottom: 20px; }
.edit-cat-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 2px 6px;
}
.edit-cat-header h3 {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1px; color: var(--text3);
}
.edit-items-list {
  background: var(--surface);
  border-radius: var(--r);
  border: 1px solid var(--border);
  overflow: hidden;
}
.edit-row {
  display: flex; align-items: center;
  padding: 9px 12px;
  border-bottom: 1px solid var(--border);
  gap: 8px;
}
.edit-row:last-child { border-bottom: none; }
.drag-handle { color: var(--text3); cursor: grab; font-size: 14px; flex-shrink: 0; user-select: none; }
.drag-handle:active { cursor: grabbing; }
.edit-item-name { flex: 1; font-size: 14px; min-width: 0; }
.sect-badge {
  font-size: 11px; padding: 2px 7px; border-radius: 10px;
  font-weight: 500; flex-shrink: 0;
}
.sect-packing  { background: var(--accent-bg); color: var(--accent); }
.sect-optional { background: var(--opt-bg); color: var(--optional); }
.edit-actions { display: flex; gap: 4px; flex-shrink: 0; }
.edit-btn {
  background: none; border: 1px solid var(--border);
  border-radius: 5px; padding: 4px 8px;
  font-size: 11px; cursor: pointer; color: var(--text2);
  white-space: nowrap;
}
.edit-btn:hover { background: var(--surface3); }
.edit-btn.del { border-color: var(--danger); color: var(--danger); }
.edit-btn.del:hover { background: var(--danger-bg); }
.add-row { display: flex; gap: 8px; margin-top: 8px; }
.add-row input {
  flex: 1; padding: 8px 10px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); color: var(--text); font-size: 13px;
}
.add-row input:focus { outline: none; border-color: var(--accent); }
.add-row select {
  padding: 8px 10px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); color: var(--text); font-size: 13px;
  appearance: none; -webkit-appearance: none;
}
.dragging { opacity: 0.35; }
.drag-over-top { border-top: 2px solid var(--accent) !important; }

/* ── History view ── */
.history-body { padding: 16px; max-width: 600px; margin: 0 auto; }
.history-search-wrap { margin-bottom: 16px; position: relative; }
.history-search {
  width: 100%; padding: 10px 12px 10px 36px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); color: var(--text); font-size: 14px;
}
.history-search:focus { outline: none; border-color: var(--accent); }
.search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 15px; pointer-events: none; }
.history-list {
  background: var(--surface);
  border-radius: var(--r);
  border: 1px solid var(--border);
  overflow: hidden;
}
.history-row {
  display: flex; align-items: center;
  padding: 11px 14px;
  border-bottom: 1px solid var(--border);
  gap: 12px;
}
.history-row:last-child { border-bottom: none; }
.history-dest { flex: 1; font-size: 14px; }
.history-dates { font-size: 12px; color: var(--text3); white-space: nowrap; }
.history-empty { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 14px; }

/* ── Empty / no trip ── */
.empty-state {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 24px; text-align: center;
}
.empty-state h2 { font-size: 20px; margin-bottom: 8px; }
.empty-state p { color: var(--text2); margin-bottom: 24px; font-size: 14px; }

/* ── Modal ── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 200; display: none;
  align-items: flex-end; justify-content: center;
}
.overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border-radius: 12px 12px 0 0;
  width: 100%; max-width: 500px;
  padding: 20px; max-height: 60vh; overflow-y: auto;
}
.modal h3 { font-size: 16px; margin-bottom: 8px; }
.modal p { font-size: 13px; color: var(--text2); margin-bottom: 16px; }
.modal-btns { display: flex; gap: 8px; }
.modal-btns .btn { flex: 1; }

/* ── Loading ── */
.loader {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 14px; z-index: 300;
}
.loader.gone { display: none; }
.spin {
  width: 28px; height: 28px;
  border: 2px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loader p { font-size: 13px; color: var(--text3); }

/* ── Bottom action bar ── */
.bottom-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  padding: 10px 16px 14px;
  display: flex; gap: 8px; justify-content: flex-end;
  background: linear-gradient(to top, var(--bg) 60%, transparent);
  z-index: 40;
}

/* ── Misc ── */
.view { display: none; flex-direction: column; flex: 1; overflow: hidden; }
.view.active { display: flex; }
.divider { height: 1px; background: var(--border); margin: 12px 0; }
</style>
</head>
<body>

<div id="app">

<!-- Loading -->
<div class="loader" id="loader">
  <div class="spin"></div>
  <p>Loading...</p>
</div>

<!-- Confirm modal -->
<div class="overlay" id="confirmOverlay">
  <div class="modal">
    <h3 id="confirmTitle"></h3>
    <p id="confirmMsg"></p>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeConfirm()">Cancel</button>
      <button class="btn btn-danger" id="confirmOk">Confirm</button>
    </div>
  </div>
</div>

<!-- ══ LIST VIEW ══ -->
<div class="view active" id="viewList">
  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-title" id="listTitle">Packing List</div>
      <div class="topbar-meta" id="listMeta"></div>
    </div>
    <div class="topbar-right">
      <button class="btn btn-ghost btn-sm" onclick="showHistory()">History</button>
      <button class="btn btn-ghost btn-sm btn-icon-only" onclick="goEdit()" title="Edit list">✏</button>
    </div>
  </div>

  <!-- Trip tabs -->
  <div class="tabs-bar" id="tabsBar"></div>

  <!-- Progress -->
  <div class="progress-strip" id="progressStrip" style="display:none">
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-label" id="progressLabel">0 / 0</div>
  </div>

  <!-- Setup panel (collapsible) -->
  <div class="setup-panel" id="setupPanel">
    <div class="setup-panel-toggle" onclick="toggleSetup()">
      <span id="setupToggleLabel">Trip Details</span>
      <span class="chevron">▾</span>
    </div>
    <div class="setup-form">
      <div class="setup-grid">
        <div class="form-group span2">
          <label>Destination</label>
          <input type="text" id="sDestination" placeholder="City, State or Country" />
        </div>
        <div class="form-group">
          <label>Depart</label>
          <input type="date" id="sStart" onchange="onDatesChange()" />
        </div>
        <div class="form-group">
          <label>Return</label>
          <input type="date" id="sEnd" onchange="onDatesChange()" />
        </div>
        <div class="form-group">
          <label>Trip Type</label>
          <div class="type-grid">
            <button class="type-btn sel" id="tPersonal" onclick="selType('personal')">Personal</button>
            <button class="type-btn" id="tBusiness" onclick="selType('business')">Business</button>
          </div>
        </div>
        <div class="form-group">
          <label>Travel Mode</label>
          <div class="travel-grid">
            <button class="type-btn sel" id="mAir" onclick="selMode('air')">Air</button>
            <button class="type-btn" id="mCar" onclick="selMode('car')">Car</button>
            <button class="type-btn" id="mOther" onclick="selMode('other')">Other</button>
          </div>
        </div>
      </div>
      <div class="biz-row" id="bizRow">
        <div class="form-group">
          <label>Business Days</label>
          <select id="sBizDays" onchange="onBizDaysChange()"></select>
        </div>
        <div class="form-group">
          <label>Casual Days</label>
          <input type="text" id="sCasualDays" readonly />

// ── App State ──────────────────────────────────────────────────
let state = {
  trips: [],        // array of trip objects
  activeIdx: 0,
  history: [],      // past trips (dest + dates)
  setupType: 'personal',
  setupMode: 'air'
};
let dragSrc = null;
let confirmCb = null;

// ── Boot ──────────────────────────────────────────────────────
async function boot() {
  try {
    const snap = await getDoc(STATE_REF);
    if (snap.exists()) {
      const saved = snap.data();
      state.trips   = saved.trips   || [];
      state.history = saved.history || [];
      state.activeIdx = Math.min(saved.activeIdx || 0, Math.max(0, state.trips.length - 1));
    }
    // Merge seeded history (at the back, most recent first in render)
    // history stored most-recent-first; seeded entries go at the end
    render();
  } catch(e) {
    console.error(e);
    alert('Could not connect to database.');
  }
  document.getElementById('loader').classList.add('gone');
}

async function save() {
  try { await setDoc(STATE_REF, { trips: state.trips, history: state.history, activeIdx: state.activeIdx }); }
  catch(e) { console.error(e); }
}

// ── Views ─────────────────────────────────────────────────────
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
window.goList    = () => { render(); showView('viewList'); };
window.goEdit    = () => { renderEdit(); showView('viewEdit'); };
window.showHistory = () => { renderHistory(); showView('viewHistory'); };

// ── Render (list view) ────────────────────────────────────────
function render() {
  renderTabs();
  const trip = state.trips[state.activeIdx];
  if (!trip) {
    // No trips: show empty + expanded setup
    document.getElementById('listTitle').textContent = 'Packing List';
    document.getElementById('listMeta').textContent  = '';
    document.getElementById('progressStrip').style.display = 'none';
    document.getElementById('markDoneBtn').style.display = 'none';
    document.getElementById('setupToggleLabel').textContent = 'New Trip';
    const panel = document.getElementById('setupPanel');
    panel.classList.remove('collapsed');
    populateSetupForm(null);
    document.getElementById('listBody').innerHTML = '';
    return;
  }

  document.getElementById('listTitle').textContent = trip.destination;
  document.getElementById('listMeta').textContent  = fmtDateRange(trip.startDate, trip.endDate) + '  ·  ' + trip.tripDays + ' days';
  document.getElementById('markDoneBtn').style.display = '';
  document.getElementById('setupToggleLabel').textContent = 'Trip Details';
  populateSetupForm(trip);
  renderList(trip);
}

function renderTabs() {
  const bar = document.getElementById('tabsBar');
  let html = '';
  state.trips.forEach((t, i) => {
    const active = i === state.activeIdx ? 'active' : '';
    html += `<button class="tab ${active}" onclick="switchTab(${i})">
      ${esc(t.destination)}
      <button class="tab-close" onclick="event.stopPropagation();confirmCloseTab(${i})">×</button>
    </button>`;
  });
  html += `<button class="tab-add" onclick="addNewTrip()" title="Add trip">+</button>`;
  bar.innerHTML = html;
}

function renderList(trip) {
  let totalPack = 0, totalDone = 0;
  let html = '';

  trip.categories.forEach(cat => {
    const packing  = cat.items.filter(i => i.section === 'packing');
    const optional = cat.items.filter(i => i.section === 'optional');
    if (!packing.length && !optional.length) return;

    let catDone = 0, catTotal = packing.length;
    packing.forEach(i => { if (isDone(i)) catDone++; });
    totalPack += catTotal; totalDone += catDone;

    const unpacked = packing.filter(i => !isDone(i));
    const packed   = packing.filter(i =>  isDone(i));

    html += `<div class="cat-block" id="cat-${cat.id}">
      <div class="cat-header" onclick="toggleCat('${cat.id}')">
        <h3>${esc(cat.name)}</h3>
        <div style="display:flex;align-items:center;gap:4px">
          <span class="cat-badge">${catDone}/${catTotal}</span>
          <span class="cat-chevron">▾</span>
        </div>
      </div>
      <div class="cat-items">`;

    [...unpacked, ...packed].forEach(item => { html += itemRowHtml(item, cat.id); });
    html += `</div>`;

    if (optional.length) {
      html += `<div class="opt-header">Optional</div><div class="opt-items">`;
      optional.forEach(item => {
        html += `<div class="opt-row">
          <span class="opt-name">${esc(item.name)}</span>
          <button class="btn-promote" onclick="promoteItem('${cat.id}','${item.id}')">Add to list</button>
        </div>`;
      });
      html += `</div>`;
    }
    html += `</div>`; // cat-block
  });

  // To-do
  html += `<div class="todo-section cat-block" id="cat-todo">
    <div class="cat-header" onclick="toggleCat('cat-todo')">
      <h3>To Do</h3><span class="cat-chevron">▾</span>
    </div>
    <div class="cat-items todo-items">`;
  (trip.todos || []).forEach(t => {
    html += `<div class="todo-row ${t.done ? 'done' : ''}">
      <input type="checkbox" class="item-cb" ${t.done ? 'checked' : ''} onchange="toggleTodo('${t.id}',this.checked)" />
      <span class="todo-text">${esc(t.text)}</span>
      <button class="todo-del" onclick="deleteTodo('${t.id}')">×</button>
    </div>`;
  });
  html += `</div>
    <div class="todo-add-row">
      <input type="text" id="todoInput" placeholder="Add a to-do..." onkeydown="if(event.key==='Enter')addTodo()" />
      <button class="btn btn-ghost btn-sm" onclick="addTodo()">Add</button>
    </div>
  </div>`;

  document.getElementById('listBody').innerHTML = html;

  const pct = totalPack > 0 ? Math.round((totalDone/totalPack)*100) : 0;
  document.getElementById('progressStrip').style.display = '';
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${totalDone} / ${totalPack} packed`;
}

function buildLeftOpts(qtp) {
  // 0 through max(10, qtp), then 10+/[max]+ for custom
  const max = Math.max(10, qtp);
  let o = '';
  for (let n = 0; n <= max; n++) o += `<option value="${n}" ${qtp===n?'selected':''}>${n}</option>`;
  o += `<option value="__custom">${max}+</option>`;
  return o;
}

function buildRightOpts(qtp, qpd) {
  // Always 0, then max(1, qtp-5) through qtp+5, then [qtp+5]+
  const lo  = Math.max(1, qtp - 5);
  const hi  = qtp + 5;
  let o = `<option value="0" ${qpd===0?'selected':''}>0</option>`;
  if (lo > 1) o += `<option disabled>—</option>`;
  for (let n = lo; n <= hi; n++) o += `<option value="${n}" ${qpd===n?'selected':''}>${n}</option>`;
  o += `<option value="__custom">${hi}+</option>`;
  return o;
}

function itemRowHtml(item, catId) {
  const done = isDone(item);
  const cls  = done ? 'item-row is-packed' : 'item-row';
  const qtp  = item.quantity;    // qty to pack (left)
  const qpd  = item.packedQty;  // qty packed  (right)

  // Left dropdown: 0-10, then 10+ triggers custom
  const leftOpts  = buildLeftOpts(qtp);
  const rightOpts = buildRightOpts(qtp, qpd);

  return `<div class="${cls}" data-item-id="${item.id}" data-cat-id="${catId}">
    <div class="qty-wrap">
      <div class="qty-custom-wrap">
        <select class="qty-sel" onchange="onLeftQty('${catId}','${item.id}',this)">${leftOpts}</select>
        <input type="number" class="qty-custom-input" id="lc-${item.id}" min="1" onblur="commitCustomLeft('${catId}','${item.id}',this)" onkeydown="if(event.key==='Enter')this.blur()" />
      </div>
      <span class="qty-divider">/</span>
      <div class="qty-custom-wrap">
        <select class="qty-sel ${done?'packed-full':qpd>0&&qpd<qtp?'under-packed':qpd>qtp?'over-packed':''}" onchange="onRightQty('${catId}','${item.id}',this)">${rightOpts}</select>
        <input type="number" class="qty-custom-input" id="rc-${item.id}" min="0" onblur="commitCustomRight('${catId}','${item.id}',this)" onkeydown="if(event.key==='Enter')this.blur()" />
      </div>
    </div>
    <span class="item-name">${esc(item.name)}</span>
  </div>`;
}

// ── Setup form ────────────────────────────────────────────────
function populateSetupForm(trip) {
  if (trip) {
    document.getElementById('sDestination').value = trip.destination;
    document.getElementById('sStart').value       = trip.startDate;
    document.getElementById('sEnd').value         = trip.endDate;
    state.setupType = trip.tripType;
    state.setupMode = trip.travelMode;
    selType(trip.tripType, false);
    selMode(trip.travelMode, false);
    if (trip.tripType === 'business') {
      populateBizDropdown(trip.tripDays, trip.businessDays);
      document.getElementById('sCasualDays').value = trip.casualDays;
    }
  } else {
    document.getElementById('sDestination').value = '';
    // Default depart to start of current week (Sunday)
    const today = new Date();
    const sunday = new Date(today);
    sunday.setDate(today.getDate() - today.getDay());
    const sundayStr = sunday.toISOString().split('T')[0];
    document.getElementById('sStart').value = sundayStr;
    document.getElementById('sStart').min   = sundayStr;
    document.getElementById('sEnd').value   = '';
    selType('personal', false);
    selMode('air', false);
    onDatesChange();
  }
}

window.toggleSetup = function() {
  document.getElementById('setupPanel').classList.toggle('collapsed');
};

window.onDatesChange = function() {
  const start = document.getElementById('sStart').value;
  if (start) {
    document.getElementById('sEnd').min = start;
    // If return is before depart, clear it
    const end = document.getElementById('sEnd').value;
    if (end && end < start) document.getElementById('sEnd').value = '';
  }
  const days = getTripDays();
  if (state.setupType === 'business' && days > 0) populateBizDropdown(days, null);
  window.onBizDaysChange();
};

window.onBizDaysChange = function() {
  const days = getTripDays();
  const biz  = parseInt(document.getElementById('sBizDays').value) || 0;
  document.getElementById('sCasualDays').value = Math.max(0, days - biz);
};

window.selType = function(t, update=true) {
  state.setupType = t;
  document.getElementById('tPersonal').classList.toggle('sel', t==='personal');
  document.getElementById('tBusiness').classList.toggle('sel', t==='business');
  const row = document.getElementById('bizRow');
  if (t === 'business') {
    row.classList.add('show');
    const days = getTripDays();
    if (days > 0) populateBizDropdown(days, null);
    window.onBizDaysChange();
  } else {
    row.classList.remove('show');
  }
};

window.selMode = function(m, update=true) {
  state.setupMode = m;
  ['air','car','other'].forEach(x =>
    document.getElementById('m'+x.charAt(0).toUpperCase()+x.slice(1)).classList.toggle('sel', x===m)
  );
};

function populateBizDropdown(days, currentVal) {
  const sel = document.getElementById('sBizDays');
  sel.innerHTML = '';
  const max = Math.max(days-1, 1);
  for (let i=1; i<=max; i++) {
    const o = document.createElement('option');
    o.value = i; o.textContent = i;
    sel.appendChild(o);
  }
  sel.value = currentVal !== null ? currentVal : Math.max(1, max-1);
}

function getTripDays() {
  const s = document.getElementById('sStart').value;
  const e = document.getElementById('sEnd').value;
  if (!s || !e) return 0;
  const d = Math.round((new Date(e+`T12:00:00`) - new Date(s+`T12:00:00`)) / 86400000) + 1;
  return d > 0 ? d : 0;
}

// ── Generate ──────────────────────────────────────────────────
window.generateList = function() {
  const dest  = document.getElementById('sDestination').value.trim();
  const start = document.getElementById('sStart').value;
  const end   = document.getElementById('sEnd').value;
  if (!dest)       { alert('Please enter a destination.'); return; }
  if (!start||!end){ alert('Please enter travel dates.'); return; }
  const days = getTripDays();
  if (days <= 0)   { alert('Return date must be after departure date.'); return; }

  const isBiz  = state.setupType === 'business';
  const bizDays = isBiz ? (parseInt(document.getElementById('sBizDays').value) || 1) : 0;
  const casDay  = isBiz ? Math.max(0, days - bizDays) : days;
  const month   = new Date(start+'T12:00:00').getMonth();
  const isWinter = month <= 1 || month >= 10;
  const isCar   = state.setupMode === 'car';

  const trip = {
    id: uid(), destination: dest, startDate: start, endDate: end,
    tripDays: days, tripType: state.setupType, travelMode: state.setupMode,
    businessDays: bizDays, casualDays: casDay, isWinter,
    categories: buildCategories({ days, isBiz, bizDays, casDay, isCar, isWinter }),
    todos: [
      { id: uid(), text: 'Pack bags',               done: false },
      { id: uid(), text: 'Charge devices',           done: false },
      { id: uid(), text: 'Check weather forecast',   done: false }
    ]
  };

  // Replace current trip if it exists, otherwise add
  if (state.trips[state.activeIdx]) {
    confirm2(`Replace "${state.trips[state.activeIdx].destination}"?`, 'This will overwrite the current trip\'s list.', () => {
      state.trips[state.activeIdx] = trip;
      finishGenerate(trip);
    });
  } else {
    state.trips.push(trip);
    state.activeIdx = state.trips.length - 1;
    finishGenerate(trip);
  }
};

function finishGenerate(trip) {
  document.getElementById('setupPanel').classList.add('collapsed');
  save();
  render();
}

// ── Switch/add/close tabs ──────────────────────────────────────
window.switchTab = function(i) {
  state.activeIdx = i;
  save();
  render();
};

window.addNewTrip = function() {
  state.trips.push(null); // placeholder
  state.activeIdx = state.trips.length - 1;
  state.trips.pop(); // remove placeholder; render will show empty
  // Actually just show setup for a new blank trip
  state.activeIdx = state.trips.length; // beyond array = new
  renderTabs();
  document.getElementById('listTitle').textContent = 'New Trip';
  document.getElementById('listMeta').textContent  = '';
  document.getElementById('progressStrip').style.display = 'none';
  document.getElementById('markDoneBtn').style.display = 'none';
  document.getElementById('listBody').innerHTML = '';
  populateSetupForm(null);
  document.getElementById('setupPanel').classList.remove('collapsed');
};

window.confirmCloseTab = function(i) {
  const t = state.trips[i];
  confirm2(`Remove "${t ? t.destination : 'this trip'}"?`, 'The trip will be removed from active tabs.', () => {
    state.trips.splice(i, 1);
    state.activeIdx = Math.min(state.activeIdx, Math.max(0, state.trips.length - 1));
    save(); render();
  });
};

// ── Mark trip done ─────────────────────────────────────────────
window.markTripDone = function() {
  const trip = state.trips[state.activeIdx];
  if (!trip) return;
  confirm2(`Mark "${trip.destination}" as done?`, 'It will be archived to Trip History.', () => {
    state.history.unshift({ destination: trip.destination, dates: fmtDateRange(trip.startDate, trip.endDate) });
    state.trips.splice(state.activeIdx, 1);
    state.activeIdx = Math.min(state.activeIdx, Math.max(0, state.trips.length - 1));
    save(); render();
  });
};

// ── List interactions ─────────────────────────────────────────
window.toggleCat = function(id) {
  const el = document.getElementById('cat-' + id) || document.getElementById(id);
  if (el) el.classList.toggle('collapsed');
};

window.onLeftQty = function(catId, itemId, sel) {
  if (sel.value === '__custom') {
    const inp = document.getElementById('lc-' + itemId);
    inp.classList.add('open');
    inp.focus();
    sel.value = sel.options[sel.options.length - 2].value;
    return;
  }
  const item = findItem(catId, itemId);
  if (!item) return;
  const val = parseInt(sel.value);
  item.quantity = val;
  if (val === 0) {
    item.section = 'optional';
    item.packedQty = 0;
  }
  save(); renderList(state.trips[state.activeIdx]);
};

window.commitCustomLeft = function(catId, itemId, inp) {
  inp.classList.remove('open');
  const val = parseInt(inp.value);
  if (!val || val < 1) return;
  const item = findItem(catId, itemId);
  if (!item) return;
  item.quantity = val;
  inp.value = '';
  save(); renderList(state.trips[state.activeIdx]);
};

window.onRightQty = function(catId, itemId, sel) {
  if (sel.value === '__custom') {
    const inp = document.getElementById('rc-' + itemId);
    inp.classList.add('open');
    inp.focus();
    sel.value = sel.options[sel.options.length - 2].value;
    return;
  }
  const item = findItem(catId, itemId);
  if (!item) return;
  item.packedQty = parseInt(sel.value);
  save(); renderList(state.trips[state.activeIdx]);
};

window.commitCustomRight = function(catId, itemId, inp) {
  inp.classList.remove('open');
  const val = parseInt(inp.value);
  if (val === undefined || val < 0 || isNaN(val)) return;
  const item = findItem(catId, itemId);
  if (!item) return;
  item.packedQty = val;
  inp.value = '';
  save(); renderList(state.trips[state.activeIdx]);
};

window.promoteItem = function(catId, itemId) {
  const item = findItem(catId, itemId);
  if (!item) return;
  item.section = 'packing';
  if (!item.quantity || item.quantity === 0) item.quantity = 1;
  save(); renderList(state.trips[state.activeIdx]);
};

window.toggleTodo = function(id, done) {
  const trip = state.trips[state.activeIdx];
  const t = trip.todos.find(x => x.id === id);
  if (t) { t.done = done; save(); renderList(trip); }
};

window.addTodo = function() {
  const inp  = document.getElementById('todoInput');
  const text = inp.value.trim();
  if (!text) return;
  const trip = state.trips[state.activeIdx];
  trip.todos.push({ id: uid(), text, done: false });
  inp.value = '';
  save(); renderList(trip);
};

window.deleteTodo = function(id) {
  const trip = state.trips[state.activeIdx];
  trip.todos = trip.todos.filter(x => x.id !== id);
  save(); renderList(trip);
};

// ── Edit view ─────────────────────────────────────────────────
function renderEdit() {
  const trip = state.trips[state.activeIdx];
  if (!trip) { showView('viewList'); return; }
  document.getElementById('editMeta').textContent = trip.destination + '  ·  ' + fmtDateRange(trip.startDate, trip.endDate);

  let html = '';
  trip.categories.forEach(cat => {
    html += `<div class="edit-cat-block">
      <div class="edit-cat-header"><h3>${esc(cat.name)}</h3></div>
      <div class="edit-items-list" id="el-${cat.id}" data-cat-id="${cat.id}">`;
    cat.items.forEach(item => { html += editRowHtml(item, cat.id); });
    html += `</div>
      <div class="add-row">
        <input type="text" placeholder="Add to ${esc(cat.name)}..." id="ai-${cat.id}" onkeydown="if(event.key==='Enter')addItem('${cat.id}')" />
        <select id="as-${cat.id}">
          <option value="packing">Packing</option>
          <option value="optional">Optional</option>
        </select>
        <button class="btn btn-ghost btn-sm" onclick="addItem('${cat.id}')">Add</button>
      </div>
    </div>`;
  });
  document.getElementById('editBody').innerHTML = html;
  initDrag();
}

function editRowHtml(item, catId) {
  const badge = item.section === 'packing'
    ? `<span class="sect-badge sect-packing">Packing</span>`
    : `<span class="sect-badge sect-optional">Optional</span>`;
  const togLabel = item.section === 'packing' ? 'Move to Optional' : 'Move to Packing';
  return `<div class="edit-row" draggable="true" data-item-id="${item.id}" data-cat-id="${catId}">
    <span class="drag-handle">⠿</span>
    <span class="edit-item-name">${esc(item.name)}</span>
    ${badge}
    <div class="edit-actions">
      <button class="edit-btn" onclick="toggleSection('${catId}','${item.id}')">${togLabel}</button>
      <button class="edit-btn del" onclick="confirmDel('${catId}','${item.id}','${esc(item.name)}')">Remove</button>
    </div>
  </div>`;
}

window.toggleSection = function(catId, itemId) {
  const item = findItem(catId, itemId);
  if (!item) return;
  item.section = item.section === 'packing' ? 'optional' : 'packing';
  save(); renderEdit();
};

window.addItem = function(catId) {
  const inp  = document.getElementById('ai-' + catId);
  const name = inp.value.trim();
  if (!name) return;
  const sec = document.getElementById('as-' + catId).value;
  const cat = findCat(catId);
  if (!cat) return;
  cat.items.push({ id: uid(), name, quantity: 1, packedQty: 0, section: sec });
  inp.value = '';
  save(); renderEdit();
};

window.confirmDel = function(catId, itemId, name) {
  confirm2(`Remove "${name}"?`, 'This item will be deleted from your list.', () => {
    const cat = findCat(catId);
    if (cat) { cat.items = cat.items.filter(i => i.id !== itemId); save(); renderEdit(); }
  });
};

// ── Drag & drop ───────────────────────────────────────────────
function initDrag() {
  document.querySelectorAll('.edit-row').forEach(row => {
    row.addEventListener('dragstart', e => { dragSrc = row; row.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; });
    row.addEventListener('dragend',   () => { row.classList.remove('dragging'); clearDragOver(); });
    row.addEventListener('dragover',  e => { e.preventDefault(); if (dragSrc && dragSrc !== row) { clearDragOver(); row.classList.add('drag-over-top'); } });
    row.addEventListener('drop',      e => { e.preventDefault(); if (!dragSrc || dragSrc === row) return; moveItemDrop(dragSrc.dataset.catId, dragSrc.dataset.itemId, row.dataset.catId, row.dataset.itemId); });
  });
}
function clearDragOver() { document.querySelectorAll('.drag-over-top').forEach(r => r.classList.remove('drag-over-top')); }

function moveItemDrop(sCatId, sItemId, tCatId, tItemId) {
  const sCat = findCat(sCatId), tCat = findCat(tCatId);
  if (!sCat || !tCat) return;
  const si = sCat.items.findIndex(i => i.id === sItemId);
  const ti = tCat.items.findIndex(i => i.id === tItemId);
  if (si === -1 || ti === -1) return;
  const [moved] = sCat.items.splice(si, 1);
  if (sCatId !== tCatId) {
    const pc = tCat.items.filter(i => i.section === 'packing').length;
    const oc = tCat.items.filter(i => i.section === 'optional').length;
    moved.section = pc >= oc ? 'packing' : 'optional';
  }
  tCat.items.splice(ti, 0, moved);
  save(); renderEdit();
}

// ── History ───────────────────────────────────────────────────
window.renderHistory = function() {
  const q = (document.getElementById('historySearch').value || '').toLowerCase();
  // Combine: user-archived trips first (most recent), then seeded history
  const all = [...state.history, ...SEEDED_HISTORY];
  const filtered = q ? all.filter(h => h.destination.toLowerCase().includes(q)) : all;

  if (!filtered.length) {
    document.getElementById('historyList').innerHTML = `<div class="history-empty">No results.</div>`;
    return;
  }
  let html = `<div class="history-list">`;
  filtered.forEach(h => {
    html += `<div class="history-row">
      <span class="history-dest">${esc(h.destination)}</span>
      <span class="history-dates">${esc(h.dates)}</span>
    </div>`;
  });
  html += `</div>`;
  document.getElementById('historyList').innerHTML = html;
};

// ── Helpers ───────────────────────────────────────────────────
function findItem(catId, itemId) {
  const cat = findCat(catId);
  return cat ? cat.items.find(i => i.id === itemId) : null;
}
function findCat(catId) {
  const trip = state.trips[state.activeIdx];
  return trip ? trip.categories.find(c => c.id === catId) : null;
}
function isDone(item) { return item.quantity > 0 && item.packedQty >= item.quantity; }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDateRange(s, e) {
  const fmt = d => new Date(d+'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  if (!s || !e) return '';
  return fmt(s) + ' – ' + fmt(e);
}

function updateProgress() {} // called after toggle but renderList already handles it

// ── Confirm modal ─────────────────────────────────────────────
function confirm2(title, msg, cb) {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmMsg').textContent   = msg;
  confirmCb = cb;
  document.getElementById('confirmOverlay').classList.add('open');
}
window.closeConfirm = () => { document.getElementById('confirmOverlay').classList.remove('open'); confirmCb = null; };
document.getElementById('confirmOk').addEventListener('click', () => { closeConfirm(); if (confirmCb) confirmCb(); });
document.getElementById('confirmOverlay').addEventListener('click', e => { if (e.target.id === 'confirmOverlay') closeConfirm(); });
